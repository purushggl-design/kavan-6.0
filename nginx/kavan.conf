# ============================================================
# KAVAN v6.0 — Nginx Configuration
# Reverse proxy + SSL termination + static file serving
# ============================================================
# Place at: /etc/nginx/sites-available/kavan.conf
# Enable:   sudo ln -s /etc/nginx/sites-available/kavan.conf \
#                      /etc/nginx/sites-enabled/
# ============================================================

# Upstream Gunicorn servers
upstream kavan_api {
    # Gunicorn socket (preferred — faster than TCP)
    server unix:/run/kavan/gunicorn.sock fail_timeout=0;

    # Or TCP if socket not available:
    # server 127.0.0.1:8000 fail_timeout=0;

    # Keepalive connections to upstream
    keepalive 64;
}

# ----------------------------------------------------------
# HTTP → HTTPS redirect
# ----------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    # Redirect all HTTP traffic to HTTPS
    return 301 https://$server_name$request_uri;
}

# ----------------------------------------------------------
# HTTPS Server
# ----------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # ----------------------------------------------------------
    # SSL Certificate
    # ----------------------------------------------------------
    ssl_certificate     /etc/nginx/ssl/kavan.crt;
    ssl_certificate_key /etc/nginx/ssl/kavan.key;

    # Modern SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;

    # ----------------------------------------------------------
    # Security Headers
    # ----------------------------------------------------------
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ----------------------------------------------------------
    # Request Limits
    # ----------------------------------------------------------
    client_max_body_size 10M;
    client_body_buffer_size 128k;

    # ----------------------------------------------------------
    # Timeouts
    # ----------------------------------------------------------
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # ----------------------------------------------------------
    # Rate Limiting (global zone defined in nginx.conf http block)
    # ----------------------------------------------------------
    # limit_req zone=kavan_api burst=20 nodelay;

    # ----------------------------------------------------------
    # Gzip Compression
    # ----------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        application/json
        application/javascript
        text/css
        text/plain
        text/xml;

    # ----------------------------------------------------------
    # Static Files (WhiteNoise also serves these, but Nginx is faster)
    # ----------------------------------------------------------
    location /static/ {
        alias /opt/kavan/backend/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /media/ {
        alias /opt/kavan/backend/media/;
        expires 1d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ----------------------------------------------------------
    # Health Check (bypass rate limiting for load balancer probes)
    # ----------------------------------------------------------
    location /health/live/ {
        proxy_pass http://kavan_api;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        access_log off;
    }

    # ----------------------------------------------------------
    # API Proxy
    # ----------------------------------------------------------
    location / {
        proxy_pass http://kavan_api;

        # Pass headers to Django
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 8 32k;
        proxy_busy_buffers_size 64k;

        # Redirect
        proxy_redirect off;

        # Upstream error handling
        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503;
    }

    # ----------------------------------------------------------
    # Error Pages
    # ----------------------------------------------------------
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
