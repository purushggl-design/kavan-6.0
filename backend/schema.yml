        GET /health/live/

        Kubernetes liveness probe.
        Returns 200 if the Django process is alive.
        Returns 503 only if the process is in a crash-loop.
      tags:
      - health
      responses:
        '200':
          description: No response body
  /health/ready/:
    get:
      operationId: health_ready_retrieve
      description: |-
        GET /health/ready/

        Kubernetes readiness probe.
        Returns 200 only when all critical services are reachable.
        Load balancer will stop sending traffic if this returns non-2xx.
      tags:
      - health
      responses:
        '200':
          description: No response body
  /health/redis/:
    get:
      operationId: health_redis_retrieve
      description: |-
        GET /health/redis/

        Redis-specific health check.
      tags:
      - health
      responses:
        '200':
          description: No response body
  /health/system/:
    get:
      operationId: health_system_retrieve
      description: |-
        GET /health/system/
        Returns real-time CPU, memory, disk usage, and thread metrics.
      tags:
      - health
      responses:
        '200':
          description: No response body
