openapi: 3.0.3
info:
  title: KAVAN API
  version: 6.0.0
  description: KAVAN v6.0 Enterprise Multi-tenant Product Launch & Management Platform
    Infrastructure API
paths:
  /api/v1/auth/forgot-password/:
    post:
      operationId: api_v1_auth_forgot_password_create
      description: Sends a password reset link to the user's email if it exists.
      summary: Forgot Password
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
        required: true
      security:
      - cookieAuth: []
      - {}
      responses:
        '200':
          description: Reset link sent successfully (or silently ignored if not found)
        '400':
          description: Validation error
  /api/v1/auth/login/:
    post:
      operationId: api_v1_auth_login_create
      description: Authenticates a user and returns JWT access and refresh tokens.
      summary: User Login
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/LoginRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      security:
      - cookieAuth: []
      - {}
      responses:
        '200':
          description: Successful login
        '400':
          description: Validation error
        '401':
          description: Invalid credentials
  /api/v1/auth/logout/:
    post:
      operationId: api_v1_auth_logout_create
      description: Logs out a user and blacklists their current refresh token.
      summary: User Logout
      tags:
      - api
      security:
      - cookieAuth: []
      responses:
        '200':
          description: Logout successful
        '401':
          description: Authentication credentials were not provided or are invalid
  /api/v1/auth/mfa/setup/:
    post:
      operationId: api_v1_auth_mfa_setup_create
      description: Initiates MFA setup by generating a secret and returning a QR code
        URI.
      summary: MFA Setup
      tags:
      - api
      security:
      - cookieAuth: []
      responses:
        '200':
          description: Returns OTP URI for QR code generation
  /api/v1/auth/mfa/verify/:
    post:
      operationId: api_v1_auth_mfa_verify_create
      description: Verifies the OTP during MFA setup or login.
      summary: MFA Verify
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MFARequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/MFARequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/MFARequest'
        required: true
      security:
      - cookieAuth: []
      responses:
        '200':
          description: MFA verified successfully
        '400':
          description: Invalid OTP
  /api/v1/auth/oauth/login/:
    post:
      operationId: api_v1_auth_oauth_login_create
      description: Authenticates a user via OAuth provider (e.g. Google, Microsoft).
      summary: OAuth Login
      tags:
      - api
      security:
      - cookieAuth: []
      - {}
      responses:
        '200':
          description: OAuth login successful
  /api/v1/auth/refresh/:
    post:
      operationId: api_v1_auth_refresh_create
      description: Provides a new access token and refresh token based on a valid
        refresh token.
      summary: Refresh JWT Token
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
        required: true
      security:
      - cookieAuth: []
      - {}
      responses:
        '200':
          description: Tokens refreshed
        '400':
          description: Validation error
        '401':
          description: Invalid or expired refresh token
  /api/v1/auth/register/:
    post:
      operationId: api_v1_auth_register_create
      description: Registers a new user and sends an email verification link.
      summary: User Registration
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
        required: true
      security:
      - cookieAuth: []
      - {}
      responses:
        '201':
          description: Registration successful
        '400':
          description: Validation error or user exists
  /api/v1/auth/reset-password/:
    post:
      operationId: api_v1_auth_reset_password_create
      description: Resets the password using the token sent to the user's email.
