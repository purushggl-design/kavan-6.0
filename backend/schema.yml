components:
  schemas:
    AuditEvent:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        user_email:
          type: string
          format: email
          readOnly: true
          title: User Email (snapshot)
          description: Denormalized email stored at event time. Preserved even if
            user is later deleted.
        event_type:
          allOf:
          - $ref: '#/components/schemas/AuditEventEventTypeEnum'
          readOnly: true
        success:
          type: boolean
          readOnly: true
          description: False for failed attempts.
        failure_reason:
          type: string
          readOnly: true
          description: Short code for why the event failed, e.g. INVALID_PASSWORD.
        ip_address:
          type: string
          readOnly: true
          nullable: true
        user_agent:
          type: string
          readOnly: true
        device_id:
          type: string
          format: uuid
          readOnly: true
          nullable: true
        location:
          type: string
          readOnly: true
          description: Approximate geo location.
        metadata:
          readOnly: true
          description: Event-specific structured context. e.g. {session_id, device_name,
            failed_count}
        tenant_id:
          type: string
          format: uuid
          readOnly: true
          nullable: true
          description: Populated by Layer 3 for tenant-scoped events.
        created_at:
          type: string
          format: date-time
          readOnly: true
          title: Occurred At
        user:
          type: string
          format: uuid
          title: User ID
          description: Null for events where user is unknown (e.g. failed login).
          readOnly: true
          nullable: true
      required:
      - created_at
      - device_id
      - event_type
      - failure_reason
      - id
      - ip_address
      - location
      - metadata
      - success
      - tenant_id
      - user
      - user_agent
      - user_email
    AuditEventEventTypeEnum:
      enum:
      - LOGIN_SUCCESS
      - LOGIN_FAILED
      - LOGOUT
      - LOGOUT_ALL
      - TOKEN_REFRESHED
      - TOKEN_REVOKED
      - PASSWORD_CHANGED
      - PASSWORD_RESET_REQUESTED
      - PASSWORD_RESET_USED
      - ACCOUNT_LOCKED
      - ACCOUNT_UNLOCKED
      - ACCOUNT_DISABLED
      - ACCOUNT_SUSPENDED
      - EMAIL_VERIFICATION_SENT
      - EMAIL_VERIFIED
      - MFA_ENABLED
      - MFA_DISABLED
      - MFA_VERIFIED
      - MFA_FAILED
      - BACKUP_CODE_USED
      - BACKUP_CODES_REGENERATED
      - NEW_DEVICE_DETECTED
      - DEVICE_TRUSTED
      - DEVICE_REMOVED
      - SESSION_CREATED
      - SESSION_EXPIRED
      - SESSION_REVOKED
      - PROFILE_UPDATED
      - SERVICE_ACCOUNT_CREATED
      - SERVICE_ACCOUNT_REVOKED
      type: string
      description: |-
        * `LOGIN_SUCCESS` - Login Success
        * `LOGIN_FAILED` - Login Failed
        * `LOGOUT` - Logout
        * `LOGOUT_ALL` - Logout All Sessions
        * `TOKEN_REFRESHED` - Token Refreshed
        * `TOKEN_REVOKED` - Token Revoked
        * `PASSWORD_CHANGED` - Password Changed
        * `PASSWORD_RESET_REQUESTED` - Password Reset Requested
        * `PASSWORD_RESET_USED` - Password Reset Used
        * `ACCOUNT_LOCKED` - Account Locked
        * `ACCOUNT_UNLOCKED` - Account Unlocked
        * `ACCOUNT_DISABLED` - Account Disabled
        * `ACCOUNT_SUSPENDED` - Account Suspended
        * `EMAIL_VERIFICATION_SENT` - Verification Email Sent
        * `EMAIL_VERIFIED` - Email Verified
        * `MFA_ENABLED` - MFA Enabled
        * `MFA_DISABLED` - MFA Disabled
        * `MFA_VERIFIED` - MFA Code Verified
        * `MFA_FAILED` - MFA Verification Failed
        * `BACKUP_CODE_USED` - Backup Code Used
        * `BACKUP_CODES_REGENERATED` - Backup Codes Regenerated
        * `NEW_DEVICE_DETECTED` - New Device Detected
        * `DEVICE_TRUSTED` - Device Trusted
        * `DEVICE_REMOVED` - Device Removed
        * `SESSION_CREATED` - Session Created
        * `SESSION_EXPIRED` - Session Expired
        * `SESSION_REVOKED` - Session Revoked
        * `PROFILE_UPDATED` - Profile Updated
