openapi: 3.0.3
info:
  title: KAVAN API
  version: 6.0.0
  description: KAVAN v6.0 Enterprise Multi-tenant Product Launch & Management Platform
    Infrastructure API
paths:
  /api/v1/accounts/:
    get:
      operationId: api_v1_accounts_list
      summary: List Users
      tags:
      - api
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
          description: ''
  /api/v1/accounts/{id}/:
    get:
      operationId: api_v1_accounts_retrieve
      summary: Get User
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - api
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
    put:
      operationId: api_v1_accounts_update
      summary: Update User
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserUpdateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserUpdateRequest'
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
  /api/v1/audit/:
    get:
      operationId: api_v1_audit_list
      summary: List Audit Events
      tags:
      - api
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AuditEvent'
          description: ''
  /api/v1/auth/forgot-password/:
    post:
      operationId: api_v1_auth_forgot_password_create
      description: Sends a password reset link to the user's email if it exists.
      summary: Forgot Password
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          description: Reset link sent successfully (or silently ignored if not found)
        '400':
          description: Validation error
  /api/v1/auth/login/:
    post:
      operationId: api_v1_auth_login_create
      description: Authenticates a user and returns JWT access and refresh tokens.
      summary: User Login
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/LoginRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          description: Successful login
        '400':
          description: Validation error
        '401':
          description: Invalid credentials
  /api/v1/auth/logout/:
    post:
      operationId: api_v1_auth_logout_create
      description: Logs out a user and blacklists their current refresh token.
      summary: User Logout
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          description: Logout successful
        '401':
          description: Authentication credentials were not provided or are invalid
  /api/v1/auth/mfa/backup-codes/:
    post:
      operationId: api_v1_auth_mfa_backup_codes_create
      description: Invalidates old backup codes and generates new ones.
      summary: Regenerate Backup Codes
      tags:
      - api
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          description: Backup codes regenerated
  /api/v1/auth/mfa/disable/:
    post:
      operationId: api_v1_auth_mfa_disable_create
      description: Disables MFA for the current user.
      summary: MFA Disable
      tags:
      - api
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          description: MFA disabled successfully
  /api/v1/auth/mfa/setup/:
    post:
      operationId: api_v1_auth_mfa_setup_create
      description: Initiates MFA setup by generating a secret and returning a QR code
        URI.
      summary: MFA Setup
      tags:
      - api
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          description: Returns OTP URI and base64 QR code
  /api/v1/auth/mfa/verify/:
    post:
      operationId: api_v1_auth_mfa_verify_create
      description: Verifies the OTP during MFA setup and activates MFA.
      summary: MFA Verify Setup
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MFARequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/MFARequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/MFARequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          description: MFA verified successfully, returns backup codes
        '400':
          description: Invalid OTP
  /api/v1/auth/oauth/login/:
    post:
      operationId: api_v1_auth_oauth_login_create
      description: Authenticates a user via OAuth provider (e.g. Google, Microsoft).
      summary: OAuth Login
      tags:
      - api
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          description: OAuth login successful
  /api/v1/auth/refresh/:
    post:
      operationId: api_v1_auth_refresh_create
      description: Provides a new access token and refresh token based on a valid
        refresh token.
      summary: Refresh JWT Token
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          description: Tokens refreshed
        '400':
          description: Validation error
        '401':
          description: Invalid or expired refresh token
  /api/v1/auth/register/:
    post:
      operationId: api_v1_auth_register_create
      description: Registers a new user and sends an email verification link.
      summary: User Registration
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '201':
          description: Registration successful
        '400':
          description: Validation error or user exists
  /api/v1/auth/reset-password/:
    post:
      operationId: api_v1_auth_reset_password_create
      description: Resets the password using the token sent to the user's email.
      summary: Reset Password
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          description: Password reset successfully
        '400':
          description: Validation error or invalid/expired token
  /api/v1/auth/verify-email/:
    post:
      operationId: api_v1_auth_verify_email_create
      description: Verifies the user's email using a token.
      summary: Verify Email
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyEmailRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/VerifyEmailRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/VerifyEmailRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          description: Email verified successfully
        '400':
          description: Validation error or invalid token
  /api/v1/devices/:
    get:
      operationId: api_v1_devices_list
      summary: List My Devices
      tags:
      - api
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Device'
          description: ''
  /api/v1/devices/{id}/:
    delete:
      operationId: api_v1_devices_destroy
      summary: Delete Device
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - api
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
                description: Unspecified response body
          description: ''
  /api/v1/marketplace/:
    get:
      operationId: api_v1_marketplace_list
      description: Tenant APIs for browsing the marketplace and managing subscriptions.
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      tags:
      - api
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedProductList'
          description: ''
  /api/v1/marketplace/{id}/:
    get:
      operationId: api_v1_marketplace_retrieve
      description: Tenant APIs for browsing the marketplace and managing subscriptions.
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
          description: Unique identifier (UUID4)
        required: true
      tags:
      - api
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
          description: ''
  /api/v1/marketplace/{id}/config/:
    put:
      operationId: api_v1_marketplace_config_update
      description: Requires product:configure permission
      summary: Configure product
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
          description: Unique identifier (UUID4)
        required: true
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ProductRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ProductRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
          description: ''
  /api/v1/marketplace/{id}/deploy/:
    post:
      operationId: api_v1_marketplace_deploy_create
      description: Requires product:deploy permission
      summary: Request deployment (Layer 6)
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
          description: Unique identifier (UUID4)
        required: true
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ProductRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ProductRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
          description: ''
  /api/v1/marketplace/{id}/subscribe/:
    post:
      operationId: api_v1_marketplace_subscribe_create
      description: Requires marketplace:subscribe permission
      summary: Subscribe to a product
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
          description: Unique identifier (UUID4)
        required: true
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ProductRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ProductRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
          description: ''
  /api/v1/marketplace/{id}/unsubscribe/:
    delete:
      operationId: api_v1_marketplace_unsubscribe_destroy
      description: Requires marketplace:unsubscribe permission
      summary: Unsubscribe from a product
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
          description: Unique identifier (UUID4)
        required: true
      tags:
      - api
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '204':
          description: No response body
  /api/v1/marketplace/featured/:
    get:
      operationId: api_v1_marketplace_featured_retrieve
      description: Requires marketplace:view permission
      summary: Get featured products
      tags:
      - api
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
          description: ''
  /api/v1/marketplace/installed/:
    get:
      operationId: api_v1_marketplace_installed_retrieve
      description: Requires product:view permission
      summary: Get installed products
      tags:
      - api
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
          description: ''
  /api/v1/marketplace/latest/:
    get:
      operationId: api_v1_marketplace_latest_retrieve
      description: Requires marketplace:view permission
      summary: Get latest products
      tags:
      - api
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
          description: ''
  /api/v1/marketplace/search/:
    get:
      operationId: api_v1_marketplace_search_retrieve
      description: Requires marketplace:view permission
      summary: Search marketplace products
      tags:
      - api
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
          description: ''
  /api/v1/marketplace/subscriptions/:
    get:
      operationId: api_v1_marketplace_subscriptions_retrieve
      description: Requires marketplace:view permission
      summary: Get active subscriptions
      tags:
      - api
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
          description: ''
  /api/v1/marketplace/trending/:
    get:
      operationId: api_v1_marketplace_trending_retrieve
      description: Requires marketplace:view permission
      summary: Get trending products
      tags:
      - api
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
          description: ''
  /api/v1/monitoring/dashboards/platform/:
    get:
      operationId: api_v1_monitoring_dashboards_platform_retrieve
      description: High-level platform metrics for operations.
      tags:
      - api
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/monitoring/dashboards/soc/:
    get:
      operationId: api_v1_monitoring_dashboards_soc_retrieve
      description: Security Operations Center dashboard metrics.
      tags:
      - api
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/monitoring/dashboards/tenant/{tenant_id}/:
    get:
      operationId: api_v1_monitoring_dashboards_tenant_retrieve
      description: Tenant-specific monitoring dashboard.
      parameters:
      - in: path
        name: tenant_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - api
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/monitoring/events/:
    get:
      operationId: api_v1_monitoring_events_list
      description: API for viewing system events (Layer 7).
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      tags:
      - api
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedEventList'
          description: ''
  /api/v1/monitoring/events/{id}/:
    get:
      operationId: api_v1_monitoring_events_retrieve
      description: API for viewing system events (Layer 7).
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
          description: Unique identifier (UUID4)
        required: true
      tags:
      - api
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
          description: ''
  /api/v1/monitoring/health-checks/:
    get:
      operationId: api_v1_monitoring_health_checks_list
      description: API for viewing historical health checks.
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      tags:
      - api
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedHealthCheckList'
          description: ''
  /api/v1/monitoring/health-checks/{id}/:
    get:
      operationId: api_v1_monitoring_health_checks_retrieve
      description: API for viewing historical health checks.
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
          description: Unique identifier (UUID4)
        required: true
      tags:
      - api
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthCheck'
          description: ''
  /api/v1/monitoring/metrics/:
    get:
      operationId: api_v1_monitoring_metrics_list
      description: API for viewing system metrics (Layer 7).
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      tags:
      - api
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedMetricList'
          description: ''
  /api/v1/monitoring/metrics/{id}/:
    get:
      operationId: api_v1_monitoring_metrics_retrieve
      description: API for viewing system metrics (Layer 7).
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
          description: Unique identifier (UUID4)
        required: true
      tags:
      - api
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Metric'
          description: ''
  /api/v1/platform/deployments/:
    get:
      operationId: api_v1_platform_deployments_list
      description: |-
        Platform APIs for managing all deployments in the KAVAN ecosystem.
        Requires deployment:manage platform permission.
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      tags:
      - api
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedDeploymentList'
          description: ''
    post:
      operationId: api_v1_platform_deployments_create
      description: |-
        Platform APIs for managing all deployments in the KAVAN ecosystem.
        Requires deployment:manage platform permission.
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeploymentRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DeploymentRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DeploymentRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deployment'
          description: ''
  /api/v1/platform/deployments/{id}/:
    get:
      operationId: api_v1_platform_deployments_retrieve
      description: |-
        Platform APIs for managing all deployments in the KAVAN ecosystem.
        Requires deployment:manage platform permission.
